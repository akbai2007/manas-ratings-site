<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Рейтинг абитуриентов — Манас</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ===== Токены ===== */
  :root{
    --bg-base:#14171C;
    --bg-surface:#1B1F27;
    --bg-surface-2:#20242E;
    --border:#2A2F3A;
    --text-primary:#ECEDEF;
    --text-muted:#8B90A0;
    --text-faint:#5B6070;
    --accent-gold:#D4A24C;
    --accent-gold-dim:#8A6E39;
    --accent-pass:#4CAF7D;
    --accent-pass-bg:rgba(76,175,125,0.10);
    --accent-fail:#E0616B;
    --accent-fail-bg:rgba(224,97,107,0.08);
    --radius:10px;
    --font-display:'Fraunces', serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'IBM Plex Mono', monospace;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg-base);
    color:var(--text-primary);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  a{color:inherit;text-decoration:none;}

  /* ===== Top bar ===== */
  .topbar{
    position:sticky; top:0; z-index:10;
    background:rgba(20,23,28,0.92);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border);
    padding:14px 20px;
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    flex-wrap:wrap;
  }
  .topbar-title{
    font-family:var(--font-display);
    font-weight:600;
    font-size:19px;
    letter-spacing:0.2px;
  }
  .topbar-title small{
    display:block;
    font-family:var(--font-body);
    font-weight:400;
    font-size:12px;
    color:var(--text-muted);
    margin-top:2px;
  }
  .topbar-right{display:flex; align-items:center; gap:10px;}
  .updated-at{font-size:12px; color:var(--text-faint); font-family:var(--font-mono);}
  .refresh-btn{
    background:var(--bg-surface-2);
    border:1px solid var(--border);
    color:var(--text-primary);
    padding:8px 14px;
    border-radius:8px;
    font-family:var(--font-body);
    font-size:13px;
    font-weight:500;
    cursor:pointer;
    display:flex; align-items:center; gap:6px;
    transition:border-color .15s ease, transform .1s ease;
  }
  .refresh-btn:hover{border-color:var(--accent-gold-dim);}
  .refresh-btn:active{transform:scale(0.97);}
  .refresh-btn svg{width:14px;height:14px;}
  .refresh-btn.spinning svg{animation:spin 0.7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  main{max-width:920px; margin:0 auto; padding:24px 20px 80px;}

  /* ===== Home / faculties ===== */
  .faculty-block{margin-bottom:34px;}
  .faculty-eyebrow{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--accent-gold);
    margin-bottom:10px;
    padding-bottom:8px;
    border-bottom:1px solid var(--border);
  }
  .direction-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(240px,1fr));
    gap:8px;
  }
  .direction-card{
    background:var(--bg-surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:13px 14px;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    cursor:pointer;
    transition:border-color .15s ease, background .15s ease;
  }
  .direction-card:hover{border-color:var(--accent-gold-dim); background:var(--bg-surface-2);}
  .direction-name{font-size:14px; font-weight:500;}
  .direction-quota{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--text-muted);
    white-space:nowrap;
  }

  /* ===== Loading / empty states ===== */
  .state-msg{
    color:var(--text-muted);
    font-size:14px;
    padding:40px 0;
    text-align:center;
  }

  /* ===== Direction detail ===== */
  .back-link{
    display:inline-flex; align-items:center; gap:6px;
    color:var(--text-muted);
    font-size:13px;
    margin-bottom:18px;
    cursor:pointer;
  }
  .back-link:hover{color:var(--text-primary);}

  .detail-header{margin-bottom:6px;}
  .detail-faculty{
    font-family:var(--font-mono);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--accent-gold);
    margin-bottom:6px;
  }
  .detail-title{
    font-family:var(--font-display);
    font-size:28px;
    font-weight:600;
  }
  .detail-meta{
    display:flex; gap:16px; flex-wrap:wrap;
    margin:14px 0 22px;
    font-size:13px; color:var(--text-muted);
  }
  .detail-meta b{color:var(--text-primary); font-family:var(--font-mono); font-weight:600;}

  .exam-banner{
    background:var(--bg-surface-2);
    border:1px solid var(--accent-gold-dim);
    border-radius:var(--radius);
    padding:12px 14px;
    font-size:13px;
    color:var(--text-primary);
    margin-bottom:20px;
    line-height:1.5;
  }
  .exam-banner b{color:var(--accent-gold);}

  /* Applicant rows */
  .applicant-row{
    display:flex; align-items:center; gap:12px;
    background:var(--bg-surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:10px 14px;
    margin-bottom:6px;
  }
  .applicant-row.pass{border-left:3px solid var(--accent-pass); background:var(--accent-pass-bg);}
  .applicant-row.fail{border-left:3px solid var(--accent-fail); background:var(--accent-fail-bg);}

  .rank-badge{
    font-family:var(--font-mono);
    font-size:13px;
    color:var(--text-muted);
    width:28px;
    text-align:right;
    flex-shrink:0;
  }
  .applicant-photo{
    width:38px; height:38px;
    border-radius:50%;
    object-fit:cover;
    background:var(--bg-surface-2);
    border:1px solid var(--border);
    flex-shrink:0;
  }
  .applicant-photo.placeholder{
    display:flex; align-items:center; justify-content:center;
    color:var(--text-faint);
  }
  .applicant-main{flex:1; min-width:0;}
  .applicant-reg{
    font-family:var(--font-mono);
    font-size:13px;
    font-weight:600;
  }
  .applicant-scores{
    font-size:11.5px;
    color:var(--text-muted);
    margin-top:2px;
    display:flex; gap:10px; flex-wrap:wrap;
  }
  .applicant-scores span b{color:var(--text-primary); font-family:var(--font-mono); font-weight:500;}
  .applicant-date{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--text-faint);
    white-space:nowrap;
    flex-shrink:0;
  }

  @media (max-width:560px){
    .applicant-date{display:none;}
    .detail-title{font-size:22px;}
  }

  footer{
    text-align:center;
    padding:30px 20px 50px;
    color:var(--text-faint);
    font-size:12px;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title" onclick="location.hash='#/'" style="cursor:pointer;">
    Рейтинг абитуриентов — Манас
    <small>Неофициальный, обновляется автоматически</small>
  </div>
  <div class="topbar-right">
    <span class="updated-at" id="updatedAt"></span>
    <button class="refresh-btn" id="refreshBtn" onclick="refresh()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
      Обновить
    </button>
  </div>
</div>

<main id="app">
  <div class="state-msg">Загрузка…</div>
</main>

<footer>Неофициальный проект. Данные — с abiturient.manas.edu.kg</footer>

<script>
const SUPABASE_URL = "https://ilxvogaomhskphicljdv.supabase.co";
const SUPABASE_KEY = "sb_publishable_TdOUCAG3Ayj-LjLQrZHYQA_62m7VnnS";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const PHOTO_BASE = "https://abiturient.manas.edu.kg/page/uploads/photo/";

let departmentsCache = null;

function timeAgoLabel(dateStr){
  if(!dateStr) return "";
  const d = new Date(dateStr);
  const diffSec = Math.round((Date.now() - d.getTime())/1000);
  if(diffSec < 60) return "обновлено только что";
  const diffMin = Math.round(diffSec/60);
  if(diffMin < 60) return `обновлено ${diffMin} мин. назад`;
  const diffH = Math.round(diffMin/60);
  return `обновлено ${diffH} ч. назад`;
}

function escapeHtml(str){
  if(str === null || str === undefined) return "";
  return String(str).replace(/[&<>"']/g, s => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[s]));
}

async function loadDepartments(){
  const {data, error} = await sb.from("departments").select("*").order("faculty").order("direction");
  if(error){ console.error(error); return []; }
  departmentsCache = data;
  return data;
}

function renderHome(departments){
  if(!departments.length){
    return `<div class="state-msg">Пока нет данных. Парсер ещё не запускался.</div>`;
  }
  const groups = {};
  departments.forEach(d => {
    if(!groups[d.faculty]) groups[d.faculty] = [];
    groups[d.faculty].push(d);
  });

  let maxUpdated = null;
  departments.forEach(d => {
    if(d.updated_at && (!maxUpdated || d.updated_at > maxUpdated)) maxUpdated = d.updated_at;
  });
  document.getElementById("updatedAt").textContent = timeAgoLabel(maxUpdated);

  let html = "";
  Object.keys(groups).forEach(faculty => {
    html += `<div class="faculty-block">
      <div class="faculty-eyebrow">${escapeHtml(faculty)}</div>
      <div class="direction-grid">`;
    groups[faculty].forEach(dep => {
      html += `<div class="direction-card" onclick="location.hash='#/dep/${dep.id}'">
        <div class="direction-name">${escapeHtml(dep.direction)}</div>
        <div class="direction-quota">${dep.quota != null ? "квота " + dep.quota : ""}</div>
      </div>`;
    });
    html += `</div></div>`;
  });
  return html;
}

async function loadDepartmentDetail(id){
  const {data: dep, error: depErr} = await sb.from("departments").select("*").eq("id", id).single();
  if(depErr || !dep){
    return `<div class="state-msg">Направление не найдено.</div>`;
  }

  const {data: applicants, error: appErr} = await supabase
    .from("applicants").select("*").eq("department_id", id).order("rank", {ascending:true, nullsFirst:false});

  const regNumbers = (applicants || []).map(a => a.reg_number);
  let photosMap = {};
  if(regNumbers.length){
    const {data: photos} = await sb.from("applicant_photos").select("*").in("reg_number", regNumbers);
    (photos || []).forEach(p => photosMap[p.reg_number] = p);
  }

  let maxUpdated = dep.updated_at;
  (applicants || []).forEach(a => { if(a.updated_at && a.updated_at > maxUpdated) maxUpdated = a.updated_at; });
  document.getElementById("updatedAt").textContent = timeAgoLabel(maxUpdated);

  let html = `<div class="back-link" onclick="location.hash='#/'">← Ко всем направлениям</div>`;
  html += `<div class="detail-header">
    <div class="detail-faculty">${escapeHtml(dep.faculty)}</div>
    <div class="detail-title">${escapeHtml(dep.direction)}</div>
  </div>`;
  html += `<div class="detail-meta">
    <span>Заявок: <b>${(applicants||[]).length}</b></span>
    ${dep.quota != null ? `<span>Квота: <b>${dep.quota}</b></span>` : ""}
  </div>`;

  if(dep.no_pass_status){
    html += `<div class="exam-banner"><b>Внимание:</b> по этому направлению итоговое зачисление определяется дополнительным экзаменом по специальности. Рейтинг ниже — предварительный, статус «прошёл / не прошёл» не применяется.</div>`;
  }

  if(!applicants || !applicants.length){
    html += `<div class="state-msg">Заявок пока нет.</div>`;
    return html;
  }

  applicants.forEach((a, idx) => {
    const photoEntry = photosMap[a.reg_number];
    const hidden = photoEntry && photoEntry.hidden;
    const customUrl = photoEntry && photoEntry.custom_photo_url;
    const photoUrl = hidden ? null : (customUrl || (PHOTO_BASE + a.reg_number + ".jpg"));

    let statusClass = "";
    if(!dep.no_pass_status && dep.quota != null && a.rank != null){
      statusClass = a.rank <= dep.quota ? "pass" : "fail";
    }

    const scoresHtml = a.scores ? Object.entries(a.scores).map(([k,v]) =>
      `<span>${escapeHtml(k)}: <b>${v}</b></span>`).join("") : "";

    html += `<div class="applicant-row ${statusClass}">
      <div class="rank-badge">${a.rank != null ? a.rank : "—"}</div>
      ${photoUrl
        ? `<img class="applicant-photo" src="${escapeHtml(photoUrl)}" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'applicant-photo placeholder',innerHTML:'<svg width=18 height=18 viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'currentColor\\' stroke-width=\\'2\\'><circle cx=\\'12\\' cy=\\'8\\' r=\\'4\\'/><path d=\\'M4 20c0-4 4-6 8-6s8 2 8 6\\'/></svg>'}))">`
        : `<div class="applicant-photo placeholder"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg></div>`
      }
      <div class="applicant-main">
        <div class="applicant-reg">${escapeHtml(a.reg_number)}</div>
        <div class="applicant-scores">${scoresHtml}</div>
      </div>
      <div class="applicant-date">${a.reg_date ? escapeHtml(a.reg_date) : ""}</div>
    </div>`;
  });

  return html;
}

async function router(){
  const app = document.getElementById("app");
  const hash = location.hash || "#/";

  if(hash.startsWith("#/dep/")){
    const id = hash.split("/")[2];
    app.innerHTML = `<div class="state-msg">Загрузка…</div>`;
    app.innerHTML = await loadDepartmentDetail(id);
  } else {
    app.innerHTML = `<div class="state-msg">Загрузка…</div>`;
    const departments = departmentsCache || await loadDepartments();
    app.innerHTML = renderHome(departments);
  }
  window.scrollTo(0,0);
}

async function refresh(){
  const btn = document.getElementById("refreshBtn");
  btn.classList.add("spinning");
  departmentsCache = null;
  await router();
  btn.classList.remove("spinning");
}

window.addEventListener("hashchange", router);
router();
</script>

</body>
</html>
